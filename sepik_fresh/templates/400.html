<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 - Bad Request | Sepik Fresh</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="error-container">
        <div class="error-content">
            <i class="fas fa-exclamation-triangle error-icon" style="color: #f59e0b;"></i>
            <h1>400</h1>
            <h2>Bad Request</h2>
            <p>The request could not be understood by the server. Please check your input and try again.</p>
            <div class="error-actions">
                <a href="javascript:history.back()" class="btn-primary">
                    <i class="fas fa-arrow-left"></i> Go Back
                </a>
                <a href="/" class="btn-secondary">
                    <i class="fas fa-home"></i> Home Page
                </a>
            </div>
        </div>
    </div>
</body>
</html>
