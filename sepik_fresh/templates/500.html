<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error | Sepik Fresh</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="error-container">
        <div class="error-content">
            <i class="fas fa-server error-icon" style="color: #dc2626;"></i>
            <h1>500</h1>
            <h2>Internal Server Error</h2>
            <p>Something went wrong on our end. Our team has been notified and is working to fix the issue.</p>
            <div class="error-actions">
                <a href="javascript:history.back()" class="btn-primary">
                    <i class="fas fa-arrow-left"></i> Go Back
                </a>
                <a href="/" class="btn-secondary">
                    <i class="fas fa-home"></i> Home Page
                </a>
            </div>
        </div>
    </div>
</body>
</html>
