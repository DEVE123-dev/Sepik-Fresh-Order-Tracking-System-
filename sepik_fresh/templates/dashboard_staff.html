<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sepik Fresh - Staff Dashboard</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="dashboard-body">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="/static/images/logo.jpeg" alt="Logo" class="sidebar-logo">
            <span>Sepik Fresh</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="sidebar-link active"><i class="fas fa-home"></i> Home</a>
            <a href="/staff/deliveries" class="sidebar-link"><i class="fas fa-truck"></i> My Deliveries</a>
            <a href="/alerts" class="sidebar-link"><i class="fas fa-bell"></i> Alerts</a>
            <a href="/profile" class="sidebar-link"><i class="fas fa-user"></i> My Profile</a>
        </nav>
        <a href="/logout" class="sidebar-logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </aside>

    <div class="dashboard-main">
        <header class="dash-topbar">
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
                <i class="fas fa-bars"></i>
            </button>
            <h2>Staff Dashboard</h2>
            <div class="dash-user">
                <i class="fas fa-user-circle"></i>
                <span>{{ session_name }}</span>
            </div>
        </header>

        <section class="dash-content">
            <h3 class="dash-welcome">Welcome, {{ session_name }}</h3>

            <div class="stats-grid">
                <div class="stat-card green">
                    <i class="fas fa-truck"></i>
                    <div><h4>Active Deliveries</h4><p class="stat-num">{{ active }}</p></div>
                </div>
            </div>
            <div class="dash-table-box">
                <h3>Deliveries <a href="/staff/deliveries" style="font-size:0.8rem; color:#f97316; margin-left:12px;">Manage</a></h3>
                <p style="color:#6b7280; padding:10px 0;">Click "Manage" to view and update delivery statuses.</p>
            </div>
        </section>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
