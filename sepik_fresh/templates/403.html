<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Forbidden | Sepik Fresh</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="error-container">
        <div class="error-content">
            <i class="fas fa-ban error-icon" style="color: #dc2626;"></i>
            <h1>403</h1>
            <h2>Access Forbidden</h2>
            <p>You don't have permission to access this resource. Please contact the administrator if you believe this is an error.</p>
            <div class="error-actions">
                <a href="javascript:history.back()" class="btn-primary">
                    <i class="fas fa-arrow-left"></i> Go Back
                </a>
                <a href="/dashboard" class="btn-secondary">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
            </div>
        </div>
    </div>
</body>
</html>
