<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sepik Fresh - Edit Profile</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="dashboard-body">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="/static/images/logo.jpeg" alt="Logo" class="sidebar-logo">
            <span>Sepik Fresh</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="sidebar-link"><i class="fas fa-home"></i> Home</a>
            <a href="/profile" class="sidebar-link active"><i class="fas fa-user"></i> Profile</a>
        </nav>
        <a href="/logout" class="sidebar-logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </aside>

    <div class="dashboard-main">
        <header class="dash-topbar">
            <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
            <h2>Edit Profile</h2>
            <div class="dash-user"><i class="fas fa-user-circle"></i><span>{{ session_name }}</span></div>
        </header>

        <section class="dash-content">
            <div class="dash-table-box" style="max-width: 700px;">
                <h3><i class="fas fa-edit" style="color:#2a7a30; margin-right:8px;"></i> Edit Profile Information</h3>
                
                {% if success %}
                <div class="flash-msg success">✓ {{ success }}</div>
                {% endif %}
                
                {% if error %}
                <div class="flash-msg error">✗ {{ error }}</div>
                {% endif %}

                <form method="POST" action="/profile/edit" style="margin-top:20px;">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>First Name *</label>
                            <input type="text" name="first_name" value="{{ user.first_name }}" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name *</label>
                            <input type="text" name="last_name" value="{{ user.last_name }}" required>
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" name="phone" value="{{ user.phone or '' }}">
                        </div>
                        <div class="form-group full-width">
                            <label>Address</label>
                            <textarea name="address" rows="3">{{ user.address or '' }}</textarea>
                        </div>
                    </div>
                    <div style="display:flex; gap:12px; margin-top:20px;">
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                        <a href="/profile" class="btn-sm" style="padding:10px 20px; background:#6b7280; color:white; text-decoration:none;">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>

            <!-- Change Password Section -->
            <div class="dash-table-box" style="max-width: 700px; margin-top:24px;">
                <h3><i class="fas fa-lock" style="color:#2a7a30; margin-right:8px;"></i> Change Password</h3>
                
                <form method="POST" action="/profile/change-password" style="margin-top:20px;">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label>Current Password *</label>
                            <input type="password" name="current_password" required>
                        </div>
                        <div class="form-group">
                            <label>New Password * (min 6 characters)</label>
                            <input type="password" name="new_password" minlength="6" required>
                        </div>
                        <div class="form-group">
                            <label>Confirm New Password *</label>
                            <input type="password" name="confirm_password" minlength="6" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" style="margin-top:20px;">
                        <i class="fas fa-key"></i> Change Password
                    </button>
                </form>
            </div>
        </section>
    </div>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
