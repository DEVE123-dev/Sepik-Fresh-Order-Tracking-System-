services:
  - type: web
    name: sepik-fresh
    env: python
    region: oregon
    buildCommand: "cd sepik_fresh && pip install -r requirements.txt"
    startCommand: "cd sepik_fresh && gunicorn --config gunicorn_config.py wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sepik-fresh-db
          property: connectionString
